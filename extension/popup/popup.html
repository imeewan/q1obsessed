<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <header class="brand">
      <span class="mark">Q1</span>
      <div class="brand-text">
        <div class="brand-name">Q1obsessed</div>
        <div class="brand-tag">Quartiles for Google Scholar</div>
      </div>
    </header>

    <p class="desc">Shows <b>SJR</b> and <b>Scopus</b> quartile badges next to every
      journal on Google Scholar. Click a badge for the full per-field ranking.</p>

    <label class="toggle">
      <span class="toggle-label">Show badges on Google Scholar</span>
      <span class="switch">
        <input type="checkbox" id="q1o-toggle" />
        <span class="slider"></span>
      </span>
    </label>

    <div class="legend">
      <span class="legend-title">Quartiles</span>
      <span class="chip q1">Q1</span>
      <span class="chip q2">Q2</span>
      <span class="chip q3">Q3</span>
      <span class="chip q4">Q4</span>
    </div>

    <footer class="links">
      <a href="https://imeewan.github.io/q1obsessed/" target="_blank" rel="noopener">Open Q1obsessed ↗</a>
      <a class="coffee" href="https://buymeacoffee.com/imeewanfiv" target="_blank" rel="noopener">☕ Buy me a coffee</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
